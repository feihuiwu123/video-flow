# Videoflow Demo Configuration
# See README for full reference.

[runtime]
workspace_root = "./workspace"
log_level = "INFO"

[rendering]
width = 1080
height = 1920
fps = 30
background_color = "#0A1929"

[tts]
provider = "edge"
voice = "zh-CN-YunxiNeural"
rate = "+0%"
pitch = "+0Hz"

[ffmpeg]
preset = "medium"
crf = 23
audio_bitrate = "192k"

[subtitles]
font_name = "PingFang SC"
font_size = 56
primary_color = "&H00FFFFFF"        # White
outline_color = "&H00000000"        # Black
alignment = 2                         # Bottom center
margin_v = 200

# Word-level subtitle alignment via faster-whisper (M3.2)
# Install: pip install -e ./mcp_servers/align
# Set provider = "mcp" to enable word-level karaoke timing
[align]
provider = "none"                  # "none" or "mcp"
mcp_transport = "stdio"            # "stdio" (spawn subprocess) or "sse" (localhost:8765)
model_size = "base"                 # faster-whisper model: tiny, base, small, medium, large-v2
language = "auto"                   # ISO code (e.g., "zh", "en") or "auto"
word_timestamps = true             # Emit karaoke tags per word
